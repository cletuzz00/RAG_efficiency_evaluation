qdrant:
  host: "localhost"
  port: 6333
  collection_name: "docs"
  distance: "cosine"        # or "dot"
  vector_size: 768
  hnsw:
    m: 16
    ef_construction: 128
    ef_search: 64

embeddings:
  model_name: "BAAI/bge-base-en"
  batch_size: 16
  cache_dir: "../data/emb_cache"

retrieval:
  top_k: 5
  # bm25_cache_path derived as ../logs/bm25_{dataset}.pkl when dataset is set
  bm25_cache_path: "../logs/bm25.pkl"
  hybrid:
    w_dense: 0.6
    w_sparse: 0.4
    score_normalization: "minmax"   # or "zscore"

metrics:
  accuracy_at_k: 5
  rem_weights:
    alpha: 0.5   # accuracy
    beta: 0.3    # latency
    gamma: 0.2   # cost

data:
  dataset: fiqa   # or fiqa; drives data paths, caches, and logs
  # optional overrides (when dataset is set these are derived as ../data/{dataset}_test_*.csv):
  # documents_csv: "../data/nfcorpus_test_documents.csv"
  # queries_csv: "../data/nfcorpus_test_queries.csv"
  # max_queries: 500
  # max_documents: 10000

logging:
  # logs_csv derived as ../logs/logs_{dataset}.csv when dataset is set
  logs_csv: "../logs/logs.csv"
